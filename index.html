<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doğal Ar-Ge Üretim Platformu |Doğal Gıda & Kozmetik Formülasyon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0a2b4e 0%, #0f3b6a 100%); min-height: 100vh; }
        .text-gold { color: #f5b042 !important; }
        .border-gold { border-color: #f5b042; }
        .bg-gold { background-color: #f5b042; }
        .btn-gold { background: linear-gradient(135deg, #f5b042 0%, #e09d2c 100%); color: #0a2b4e; font-weight: 700; transition: 0.2s; }
        .btn-gold:hover { transform: scale(1.02); opacity: 0.95; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(2px); border-radius: 1.5rem; border: 1px solid rgba(245,176,66,0.3); transition: 0.2s; }
        .card:hover { border-color: #f5b042; transform: translateY(-2px); }
        /* Sidebar stilleri */
        .sidebar-link { transition: all 0.2s ease; cursor: pointer; border-radius: 0.75rem; }
        .sidebar-link:hover { background: rgba(245, 176, 66, 0.15); transform: translateX(4px); color: #f5b042; }
        .active-page { background: linear-gradient(135deg, #f5b042 0%, #e09d2c 100%); color: #0a2b4e; }
        .active-page i, .active-page span { color: #0a2b4e; }
        /* Modal stilleri */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #0f2c44; border-radius: 1.5rem; max-width: 500px; width: 90%; padding: 2rem; border: 1px solid #f5b042; }
        .admin-badge { background: #f5b04220; color: #f5b042; border-radius: 999px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .admin-badge:hover { background: #f5b04240; }
        .input-dark { background: #0f2c44; border: 1px solid #f5b04260; color: white; border-radius: 0.75rem; padding: 0.5rem 0.75rem; width: 100%; }
        .input-dark:focus { outline: none; border-color: #f5b042; }
        .product-item, .investment-item, .faizsiz-item { transition: 0.2s; }
        .product-item:hover, .investment-item:hover, .faizsiz-item:hover { background: #f5b04210; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen"></div>

<script>
    // ---------- STATE ----------
    let currentUser = null;
    let isAdmin = false;
    let currentPage = "home";
    
    // ---------- SİSTEM VERİLERİ ----------
    let products = [
        { id: 1, name: "Probiyotik Fermente İçecek", price: 45, category: "gıda", image: "🍏", stock: 100, type: "Gıda" },
        { id: 2, name: "Adaptojen Bitki Çayı", price: 38, category: "gıda", image: "🍵", stock: 80, type: "Gıda" },
        { id: 3, name: "Kolajenli Vegan Bar", price: 52, category: "gıda", image: "🍫", stock: 120, type: "Gıda" },
        { id: 4, name: "Niasinamidli Arındırıcı Tonik", price: 180, category: "kozmetik", image: "💧", stock: 45, type: "Kozmetik" },
        { id: 5, name: "Retinol Alternatif Serum", price: 220, category: "kozmetik", image: "✨", stock: 30, type: "Kozmetik" },
        { id: 6, name: "Shea ve Balmumu Nemlendirici", price: 95, category: "kozmetik", image: "🧴", stock: 60, type: "Kozmetik" }
    ];
    
    let packages = [
        { id: 1, name: "Başlangıç Paketi", price: 299, features: ["3 Ürün (karışık)", "Kargo Dahil", "1 Ay Destek"], icon: "fa-rocket", whatsapp: "Başlangıç Paketi satın almak istiyorum." },
        { id: 2, name: "Profesyonel Paket", price: 799, features: ["8 Ürün (seçmeli)", "Kargo Dahil", "3 Ay Destek", "Özel İndirim"], icon: "fa-chart-line", whatsapp: "Profesyonel Paket satın almak istiyorum.", popular: true },
        { id: 3, name: "Kurumsal Paket", price: 1999, features: ["25 Ürün (seçmeli)", "Öncelikli Kargo", "12 Ay Destek", "Özel Ürün Geliştirme"], icon: "fa-crown", whatsapp: "Kurumsal Paket satın almak istiyorum." }
    ];
    
    // ---------- YARDIMCI FONKSİYONLAR ----------
    function formatMoney(amount) { return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(amount); }
    function showToast(message) { alert(message); }
    
    // ---------- KİMLİK DOĞRULAMA (Demo) ----------
    function handleLogin(email, password) {
        if (email === "admin@example.com" && password === "Admin123!") {
            currentUser = { name: "Admin", email: email, role: "admin" };
            isAdmin = true;
            render();
            return true;
        } else if (email === "demo@example.com" && password === "demo123") {
            currentUser = { name: "Demo Kullanıcı", email: email, role: "user" };
            isAdmin = false;
            render();
            return true;
        }
        return false;
    }
    
    function handleLogout() { currentUser = null; isAdmin = false; render(); }
    
    // ---------- YÖNETİM PANELİ (Ürün Ekleme/Silme) ----------
    let adminPassword = "admin123";
    
    function openAdminPanel() {
        if (!currentUser || currentUser.role !== "admin") {
            alert("Yönetici değilsiniz! Giriş yapın.");
            return;
        }
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">👑 Yönetici Paneli</h2>
                <input type="password" id="adminPass" placeholder="Şifre" class="input-dark mb-4">
                <button id="verifyAdmin" class="w-full btn-gold py-2 rounded-lg">Giriş</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("verifyAdmin").onclick = () => {
            if (document.getElementById("adminPass").value === adminPassword) {
                modal.remove();
                adminMode = true;
                renderAdminModal();
            } else {
                alert("Şifre yanlış!");
            }
        };
    }
    
    let adminMode = false;
    function renderAdminModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">📦 Ürün Yönetimi</h2>
                <div class="mb-4">
                    <input type="text" id="prodName" placeholder="Ürün Adı" class="input-dark mb-2">
                    <input type="number" id="prodPrice" placeholder="Fiyat (₺)" class="input-dark mb-2">
                    <select id="prodCategory" class="input-dark mb-2">
                        <option value="gıda">Gıda</option>
                        <option value="kozmetik">Kozmetik</option>
                    </select>
                    <input type="text" id="prodImage" placeholder="Emoji" class="input-dark mb-2">
                    <button id="addProductBtn" class="w-full btn-gold py-2 rounded-lg">Ürün Ekle</button>
                </div>
                <hr class="border-gold/30 my-3">
                <h3 class="text-gold font-bold mb-2">Mevcut Ürünler</h3>
                <div id="productList" class="max-h-60 overflow-y-auto"></div>
                <button class="mt-4 w-full py-2 rounded-lg border border-gray-500 text-gray-300" onclick="this.closest('.modal').remove()">Kapat</button>
            </div>
        `;
        document.body.appendChild(modal);
        renderProductListInModal();
        document.getElementById("addProductBtn").onclick = () => {
            let name = document.getElementById("prodName").value;
            let price = parseFloat(document.getElementById("prodPrice").value);
            let category = document.getElementById("prodCategory").value;
            let image = document.getElementById("prodImage").value;
            if (name && price) {
                let newId = products.length + 1;
                products.push({ id: newId, name, price, category, image: image || "📦", stock: 0, type: category === "gıda" ? "Gıda" : "Kozmetik" });
                showToast("✅ Ürün eklendi!");
                renderProductListInModal();
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
                document.getElementById("prodImage").value = "";
            } else alert("Tüm alanları doldurun!");
        };
    }
    
    function renderProductListInModal() {
        const container = document.getElementById("productList");
        if (!container) return;
        container.innerHTML = products.map(p => `
            <div class="flex justify-between items-center p-2 border-b border-gray-600">
                <span><span class="text-gold">${p.image}</span> ${p.name} - ${formatMoney(p.price)}</span>
                <button onclick="deleteProduct(${p.id})" class="text-red-400 text-sm">🗑️ Sil</button>
            </div>
        `).join('');
    }
    
    function deleteProduct(id) {
        if (confirm("Bu ürünü silmek istediğinize emin misiniz?")) {
            products = products.filter(p => p.id !== id);
            showToast("🗑️ Ürün silindi!");
            renderProductListInModal();
            render();
        }
    }
    
    // ---------- WHATSAPP BAĞLANTISI ----------
    function whatsappLink(text) { window.open(`https://wa.me/905409666602?text=${encodeURIComponent(text)}`, '_blank'); }
    
    // ---------- LOGIN MODAL ----------
    function openLoginModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">🔐 Giriş Yap</h2>
                <input type="email" id="loginEmail" placeholder="E-posta" class="input-dark mb-3">
                <input type="password" id="loginPassword" placeholder="Şifre" class="input-dark mb-4">
                <button id="doLogin" class="w-full btn-gold py-2 rounded-lg">Giriş Yap</button>
                <p class="text-center text-gray-400 text-sm mt-4">Demo: admin@example.com / Admin123!</p>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("doLogin").onclick = () => {
            if (handleLogin(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value)) modal.remove();
            else alert("Hatalı giriş!");
        };
    }
    
    // ---------- SABUN HESAPLAMA PANELİ ----------
    function updateSoapCalculator() {
        let soapType = document.getElementById("soapType")?.value;
        let oilAmount = parseFloat(document.getElementById("oilAmount")?.value) || 0;
        let waterPercent = parseFloat(document.getElementById("waterPercent")?.value) || 0;
        let superfat = parseFloat(document.getElementById("superfat")?.value) || 0;
        
        let sapValue = soapType === "solid" ? 0.142 : 0.19; // NaOH için sabunlaşma değeri (Zeytinyağı bazlı), KOH için yaklaşık
        let lyeAmount = oilAmount * sapValue * (1 - superfat / 100);
        let waterAmount = oilAmount * (waterPercent / 100);
        
        document.getElementById("lyeAmount").innerText = lyeAmount.toFixed(1);
        document.getElementById("waterAmountResult").innerText = waterAmount.toFixed(1);
        document.getElementById("totalWeight").innerText = (oilAmount + waterAmount + lyeAmount).toFixed(1);
    }
    
    // ---------- SAYFA İÇERİKLERİ ----------
    const pages = {
        home: () => `
            <div class="mb-6"><h2 class="text-3xl font-bold text-gold mb-2">Faizsiz Finans Ekosistemi</h2><p class="text-gray-300">Helal kazanç, ortak yatırım, barter, FIRE fonu ve katılım modelleri</p></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="card p-6"><i class="fas fa-chart-line text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">Yatırım Ürünleri</h3><p class="text-gray-400">Kira sertifikası, sukuk, katılım hisse</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='yatirim';render()">→ Detay</button></div>
                <div class="card p-6"><i class="fas fa-hand-holding-heart text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">Faizsiz Sistem</h3><p class="text-gray-400">Eminevim/Katılımevim modeli</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='faizsiz';render()">→ Detay</button></div>
                <div class="card p-6"><i class="fas fa-exchange-alt text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">Barter Modülü</h3><p class="text-gray-400">İşletmeler arası takas</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='barter';render()">→ Detay</button></div>
                <div class="card p-6"><i class="fas fa-handshake text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">Ortak Yatırım</h3><p class="text-gray-400">Kâr-zarar ortaklığı</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='ortakyatirim';render()">→ Detay</button></div>
                <div class="card p-6"><i class="fas fa-fire text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">FİRE Yatırım Fonu</h3><p class="text-gray-400">Faizsiz birikim fonu</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='firefonu';render()">→ Detay</button></div>
                <div class="card p-6"><i class="fas fa-users text-gold text-3xl mb-2"></i><h3 class="text-xl font-bold text-gold">Ortaklık Paketleri</h3><p class="text-gray-400">WhatsApp satış ortaklığı</p><button class="mt-3 text-gold font-semibold" onclick="currentPage='ortaklikpaketleri';render()">→ Detay</button></div>
            </div>
        `,
        yatirim: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">📊 Yatırım Ürünleri (Faizsiz)</h2><div class="space-y-3">${["Kira Sertifikası (Sukuk) - Yıllık %14 getiri", "Katılım Endeksi Hisse Sepeti", "Altın ve Emtia Katılım Fonu", "Gayrimenkul Ortaklığı (REIT)"].map(p => `<div class="flex justify-between p-3 bg-[#0f2c44] rounded-xl"><span>${p}</span><button class="text-gold text-sm font-semibold" onclick="whatsappLink('Yatırım başvurusu: ${p}')">WhatsApp ile Başvur</button></div>`).join('')}</div></div>`,
        faizsiz: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">🏠 Faizsiz Sistem Ürünleri</h2><div class="grid gap-3">${["Araç Finansmanı", "Ev Finansmanı", "İşyeri Finansmanı", "Ev Eşyası Finansmanı"].map(u => `<div class="flex justify-between items-center p-3 bg-[#0f2c44] rounded-xl"><div><h3 class="font-bold text-gold">${u}</h3><p class="text-sm text-gray-400">Faizsiz taksitli ödeme</p></div><button class="text-gold text-sm font-semibold" onclick="whatsappLink('Faizsiz ürün başvurusu: ${u}')">Başvur</button></div>`).join('')}</div></div>`,
        barter: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">🔄 Barter (Takas) Modülü</h2><p class="text-gray-300 mb-4">İşletmeler arası mal/hizmet takası. Faizsiz, komisyonsuz.</p><div class="grid md:grid-cols-2 gap-4"><button class="btn-gold py-2 rounded-lg" onclick="whatsappLink('Barter takas ilanı vermek istiyorum')">Takas İlanı Ver</button><button class="btn-gold py-2 rounded-lg" onclick="whatsappLink('Barter takas aramak istiyorum')">Takas Ara</button></div></div>`,
        ortakyatirim: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">🤝 Ortak Yatırım Havuzları</h2><div class="space-y-3">${["Teknolojik Üretim Girişimi", "Doğal Ürün Girişimi", "Yazılım ve Yapay Zeka Girişimi"].map(h => `<div class="flex justify-between items-center p-3 bg-[#0f2c44] rounded-xl"><div><h3 class="font-bold text-gold">${h}</h3><p class="text-sm text-gray-400">Hedef: 10.000.000 ₺</p></div><button class="text-gold text-sm font-semibold" onclick="whatsappLink('Ortak yatırım başvurusu: ${h}')">Katıl</button></div>`).join('')}</div></div>`,
        firefonu: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">🔥 FİRE Yatırım Fonu</h2><p class="text-gray-300">Finansal bağımsızlık için faizsiz birikim fonu.</p><div class="bg-[#0f2c44] p-4 rounded-xl mt-4"><p class="text-gold font-semibold">Hedef Büyüklük: 50.000.000 ₺</p><p class="text-gold">Güncel Katılım: 12.450.000 ₺</p><div class="h-2 bg-gray-700 rounded-full mt-2"><div class="w-1/4 bg-gold h-2 rounded-full"></div></div><button class="mt-4 btn-gold w-full py-2 rounded-lg" onclick="whatsappLink('FİRE Yatırım Fonu başvurusu')">Fon Katıl (WhatsApp)</button></div></div>`,
        ortaklikpaketleri: () => `<div class="card p-6"><h2 class="text-2xl font-bold text-gold mb-4">🤝 Ortaklık Paketleri (WhatsApp)</h2><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">${packages.map(p => `<div class="p-4 bg-[#0f2c44] rounded-xl text-center"><i class="fas ${p.icon} text-gold text-3xl mb-2"></i><h3 class="font-bold text-gold text-lg">${p.name}</h3><p class="text-gold font-semibold">${formatMoney(p.price)}</p><ul class="text-sm text-gray-400 text-left mt-2">${p.features.map(f => `<li><i class="fas fa-check text-gold mr-1"></i>${f}</li>`).join('')}</ul><button class="mt-3 btn-gold px-3 py-1 rounded-lg text-sm w-full" onclick="whatsappLink('${p.whatsapp}')">WhatsApp ile Satın Al</button></div>`).join('')}</div></div>`
    };
    
    // ---------- SIDEBAR ----------
    function renderSidebar() {
        const menu = [
            { id: "home", label: "🏠 Ana Sayfa", icon: "fa-home" },
            { id: "calculator", label: "🧪 Ürün Hesaplama", icon: "fa-calculator" },
            { id: "packages", label: "📦 Paketler", icon: "fa-box" },
            { id: "market", label: "🌿 Doğal Ürün Marketi", icon: "fa-store" }
        ];
        return `
            <aside class="fixed left-0 top-0 h-full w-72 bg-[#0a2b4e] shadow-2xl border-r border-[#1e4a76] p-5 overflow-y-auto z-10">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3"><i class="fas fa-flask text-gold text-2xl"></i><h1 class="text-2xl font-bold text-gold">Ar-Ge Platformu</h1></div>
                    <div class="admin-badge" onclick="openAdminPanel()"><i class="fas fa-shield-alt mr-1"></i>Yönetim</div>
                </div>
                <nav class="space-y-1">
                    ${menu.map(item => `<div onclick="currentPage='${item.id}'; render()" class="sidebar-link flex items-center gap-3 px-4 py-3 ${currentPage === item.id ? 'active-page' : 'text-gray-300'}"><i class="fas ${item.icon} w-5"></i><span>${item.label}</span></div>`).join('')}
                </nav>
                <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-[#1e4a76]">
                    ${!currentUser ? `<button onclick="openLoginModal()" class="w-full btn-gold py-2 rounded-lg">Giriş Yap / Kayıt Ol</button>` : `<div class="text-center"><p class="text-gold font-bold">${currentUser.name}</p><p class="text-sm text-gray-400">${currentUser.role === 'admin' ? 'Yönetici' : 'Kullanıcı'}</p><button onclick="handleLogout()" class="mt-2 text-red-400 text-sm">Çıkış Yap</button></div>`}
                </div>
            </aside>
        `;
    }
    
    // ---------- YENİ SAYFALAR ----------
    const newPages = {
        calculator: () => `
            <div class="card p-6">
                <h2 class="text-2xl font-bold text-gold mb-4">🧪 Sabun Hesaplayıcı</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gold font-semibold mb-1">Sabun Türü</label>
                        <select id="soapType" class="input-dark mb-4" onchange="updateSoapCalculator()">
                            <option value="solid">Katı Sabun (NaOH)</option>
                            <option value="liquid">Sıvı Sabun (KOH)</option>
                        </select>
                        <label class="block text-gold font-semibold mb-1">Toplam Yağ Ağırlığı (gram)</label>
                        <input type="number" id="oilAmount" value="1000" class="input-dark mb-4" oninput="updateSoapCalculator()">
                        <label class="block text-gold font-semibold mb-1">Su Yüzdesi (%)</label>
                        <input type="number" id="waterPercent" value="30" class="input-dark mb-4" oninput="updateSoapCalculator()">
                        <label class="block text-gold font-semibold mb-1">Süper Yağlama (%)</label>
                        <input type="number" id="superfat" value="5" class="input-dark mb-4" oninput="updateSoapCalculator()">
                    </div>
                    <div class="bg-[#0f2c44] p-4 rounded-xl">
                        <h3 class="text-gold font-bold mb-3">Hesaplanan Değerler</h3>
                        <p>Kostik (NaOH/KOH) : <span id="lyeAmount" class="text-gold font-bold">0</span> gr</p>
                        <p>Su Miktarı : <span id="waterAmountResult" class="text-gold font-bold">0</span> gr</p>
                        <p>Toplam Ağırlık : <span id="totalWeight" class="text-gold font-bold">0</span> gr</p>
                        <button class="mt-4 btn-gold w-full py-2 rounded-lg" onclick="whatsappLink('Sabun hesaplama sonucu: Kostik: '+document.getElementById('lyeAmount').innerText+' gr, Su: '+document.getElementById('waterAmountResult').innerText+' gr')">Sonucu WhatsApp ile Paylaş</button>
                    </div>
                </div>
            </div>
        `,
        packages: () => `
            <div class="card p-6">
                <h2 class="text-2xl font-bold text-gold mb-4">📦 Özel Ürün Paketleri</h2>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${packages.map(p => `
                        <div class="bg-[#0f2c44] rounded-xl p-6 text-center ${p.popular ? 'border-2 border-gold' : ''}">
                            ${p.popular ? '<span class="bg-gold text-[#0a2b4e] text-xs font-bold px-3 py-1 rounded-full">Popüler</span>' : ''}
                            <i class="fas ${p.icon} text-gold text-4xl my-3"></i>
                            <h3 class="text-xl font-bold text-white">${p.name}</h3>
                            <p class="text-2xl font-bold text-gold my-2">${formatMoney(p.price)}</p>
                            <ul class="text-sm text-gray-300 text-left mt-4 space-y-2">
                                ${p.features.map(f => `<li><i class="fas fa-check text-gold mr-2"></i>${f}</li>`).join('')}
                            </ul>
                            <button onclick="whatsappLink('${p.whatsapp}')" class="mt-6 w-full btn-gold py-2 rounded-lg font-semibold">WhatsApp ile Satın Al</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `,
