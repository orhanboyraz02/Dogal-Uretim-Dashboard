<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doğal Üretim Platformu |Doğal Gıda & Kozmetik Formülasyon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0a2b4e 0%, #0f3b6a 100%); min-height: 100vh; }
        .text-gold { color: #f5b042 !important; }
        .border-gold { border-color: #f5b042; }
        .bg-gold { background-color: #f5b042; }
        .btn-gold { background: linear-gradient(135deg, #f5b042 0%, #e09d2c 100%); color: #0a2b4e; font-weight: 700; transition: 0.2s; }
        .btn-gold:hover { transform: scale(1.02); opacity: 0.95; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(2px); border-radius: 1.5rem; border: 1px solid rgba(245,176,66,0.3); transition: 0.2s; }
        .card:hover { border-color: #f5b042; transform: translateY(-2px); }
        /* Sidebar stilleri */
        .sidebar-link { transition: all 0.2s ease; cursor: pointer; border-radius: 0.75rem; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 12px; }
        .sidebar-link:hover { background: rgba(245, 176, 66, 0.15); transform: translateX(4px); color: #f5b042; }
        .active-page { background: linear-gradient(135deg, #f5b042 0%, #e09d2c 100%); color: #0a2b4e; }
        .active-page i, .active-page span { color: #0a2b4e; }
        /* Modal stilleri */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #0f2c44; border-radius: 1.5rem; max-width: 500px; width: 90%; padding: 2rem; border: 1px solid #f5b042; }
        .admin-badge { background: #f5b04220; color: #f5b042; border-radius: 999px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .admin-badge:hover { background: #f5b04240; }
        .input-dark { background: #0f2c44; border: 1px solid #f5b04260; color: white; border-radius: 0.75rem; padding: 0.5rem 0.75rem; width: 100%; }
        .input-dark:focus { outline: none; border-color: #f5b042; }
        /* Beyaz yazılar için */
        .text-white-custom { color: white !important; }
        .text-gray-light { color: #e2e8f0; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen"></div>

<script>
    // ---------- STATE ----------
    let currentUser = null;
    let isAdmin = false;
    let currentPage = "home";   // home, calculator, packages, market
    
    // ---------- ORİJİNAL AR-GE VERİLERİ ----------
    let products = [
        { id: 1, name: "Probiyotik Fermente İçecek", price: 45, category: "gıda", image: "🍏", stock: 100, type: "Gıda" },
        { id: 2, name: "Adaptojen Bitki Çayı", price: 38, category: "gıda", image: "🍵", stock: 80, type: "Gıda" },
        { id: 3, name: "Kolajenli Vegan Bar", price: 52, category: "gıda", image: "🍫", stock: 120, type: "Gıda" },
        { id: 4, name: "Niasinamidli Arındırıcı Tonik", price: 180, category: "kozmetik", image: "💧", stock: 45, type: "Kozmetik" },
        { id: 5, name: "Retinol Alternatif Serum", price: 220, category: "kozmetik", image: "✨", stock: 30, type: "Kozmetik" },
        { id: 6, name: "Shea ve Balmumu Nemlendirici", price: 95, category: "kozmetik", image: "🧴", stock: 60, type: "Kozmetik" }
    ];
    
    let packages = [
        { id: 1, name: "Başlangıç Paketi", price: 299, features: ["3 Ürün (karışık)", "Kargo Dahil", "1 Ay Destek"], icon: "fa-rocket", whatsapp: "Başlangıç Paketi satın almak istiyorum." },
        { id: 2, name: "Profesyonel Paket", price: 799, features: ["8 Ürün (seçmeli)", "Kargo Dahil", "3 Ay Destek", "Özel İndirim"], icon: "fa-chart-line", whatsapp: "Profesyonel Paket satın almak istiyorum.", popular: true },
        { id: 3, name: "Kurumsal Paket", price: 1999, features: ["25 Ürün (seçmeli)", "Öncelikli Kargo", "12 Ay Destek", "Özel Ürün Geliştirme"], icon: "fa-crown", whatsapp: "Kurumsal Paket satın almak istiyorum." }
    ];
    
    // ---------- YARDIMCI FONKSİYONLAR ----------
    function formatMoney(amount) { return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(amount); }
    function showToast(message) { alert(message); }
    
    // ---------- KİMLİK DOĞRULAMA ----------
    function handleLogin(email, password) {
        if (email === "admin@example.com" && password === "Admin123!") {
            currentUser = { name: "Admin", email: email, role: "admin" };
            isAdmin = true;
            render();
            return true;
        } else if (email === "demo@example.com" && password === "demo123") {
            currentUser = { name: "Demo Kullanıcı", email: email, role: "user" };
            isAdmin = false;
            render();
            return true;
        }
        return false;
    }
    function handleLogout() { currentUser = null; isAdmin = false; render(); }
    
    // ---------- YÖNETİM PANELİ ----------
    let adminPassword = "admin123";
    function openAdminPanel() {
        if (!currentUser || currentUser.role !== "admin") {
            alert("Yönetici değilsiniz! Lütfen admin hesabıyla giriş yapın.");
            return;
        }
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">👑 Yönetici Paneli</h2>
                <input type="password" id="adminPass" placeholder="Şifre" class="input-dark mb-4">
                <button id="verifyAdmin" class="w-full btn-gold py-2 rounded-lg">Giriş</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("verifyAdmin").onclick = () => {
            if (document.getElementById("adminPass").value === adminPassword) {
                modal.remove();
                renderAdminModal();
            } else {
                alert("Şifre yanlış!");
            }
        };
    }
    
    function renderAdminModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">📦 Ürün Yönetimi</h2>
                <div class="mb-4">
                    <input type="text" id="prodName" placeholder="Ürün Adı" class="input-dark mb-2">
                    <input type="number" id="prodPrice" placeholder="Fiyat (₺)" class="input-dark mb-2">
                    <select id="prodCategory" class="input-dark mb-2">
                        <option value="gıda">Gıda</option>
                        <option value="kozmetik">Kozmetik</option>
                    </select>
                    <input type="text" id="prodImage" placeholder="Emoji" class="input-dark mb-2">
                    <button id="addProductBtn" class="w-full btn-gold py-2 rounded-lg">Ürün Ekle</button>
                </div>
                <hr class="border-gold/30 my-3">
                <h3 class="text-gold font-bold mb-2">Mevcut Ürünler</h3>
                <div id="productList" class="max-h-60 overflow-y-auto"></div>
                <button class="mt-4 w-full py-2 rounded-lg border border-gray-500 text-gray-300" onclick="this.closest('.modal').remove()">Kapat</button>
            </div>
        `;
        document.body.appendChild(modal);
        renderProductListInModal();
        document.getElementById("addProductBtn").onclick = () => {
            let name = document.getElementById("prodName").value;
            let price = parseFloat(document.getElementById("prodPrice").value);
            let category = document.getElementById("prodCategory").value;
            let image = document.getElementById("prodImage").value;
            if (name && price) {
                let newId = products.length + 1;
                products.push({ id: newId, name, price, category, image: image || "📦", stock: 0, type: category === "gıda" ? "Gıda" : "Kozmetik" });
                showToast("✅ Ürün eklendi!");
                renderProductListInModal();
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
                document.getElementById("prodImage").value = "";
            } else alert("Tüm alanları doldurun!");
        };
    }
    
    function renderProductListInModal() {
        const container = document.getElementById("productList");
        if (!container) return;
        container.innerHTML = products.map(p => `
            <div class="flex justify-between items-center p-2 border-b border-gray-600 text-white">
                <span><span class="text-gold">${p.image}</span> ${p.name} - ${formatMoney(p.price)}</span>
                <button onclick="deleteProduct(${p.id})" class="text-red-400 text-sm">🗑️ Sil</button>
            </div>
        `).join('');
    }
    
    function deleteProduct(id) {
        if (confirm("Bu ürünü silmek istediğinize emin misiniz?")) {
            products = products.filter(p => p.id !== id);
            showToast("🗑️ Ürün silindi!");
            renderProductListInModal();
            render();
        }
    }
    
    // ---------- WHATSAPP BAĞLANTISI ----------
    function whatsappLink(text) { window.open(`https://wa.me/905409666602?text=${encodeURIComponent(text)}`, '_blank'); }
    
    // ---------- LOGIN MODAL ----------
    function openLoginModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="text-2xl font-bold text-gold mb-4">🔐 Giriş Yap</h2>
                <input type="email" id="loginEmail" placeholder="E-posta" class="input-dark mb-3">
                <input type="password" id="loginPassword" placeholder="Şifre" class="input-dark mb-4">
                <button id="doLogin" class="w-full btn-gold py-2 rounded-lg">Giriş Yap</button>
                <p class="text-center text-gray-400 text-sm mt-4">Demo: admin@example.com / Admin123!</p>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("doLogin").onclick = () => {
            if (handleLogin(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value)) modal.remove();
            else alert("Hatalı giriş!");
        };
    }
    
    // ---------- SABUN HESAPLAMA PANELİ ----------
    function updateSoapCalculator() {
        let soapType = document.getElementById("soapType")?.value;
        let oilAmount = parseFloat(document.getElementById("oilAmount")?.value) || 0;
        let waterPercent = parseFloat(document.getElementById("waterPercent")?.value) || 0;
        let superfat = parseFloat(document.getElementById("superfat")?.value) || 0;
        let sapValue = soapType === "solid" ? 0.142 : 0.19;
        let lyeAmount = oilAmount * sapValue * (1 - superfat / 100);
        let waterAmount = oilAmount * (waterPercent / 100);
        document.getElementById("lyeAmount").innerText = lyeAmount.toFixed(1);
        document.getElementById("waterAmountResult").innerText = waterAmount.toFixed(1);
        document.getElementById("totalWeight").innerText = (oilAmount + waterAmount + lyeAmount).toFixed(1);
    }
    
    // ---------- SIDEBAR ----------
    function renderSidebar() {
        const menu = [
            { id: "home", label: "🏠 Ana Sayfa", icon: "fa-home" },
            { id: "calculator", label: "🧪 Ürün Hesaplama", icon: "fa-calculator" },
            { id: "packages", label: "📦 Paketler", icon: "fa-box" },
            { id: "market", label: "🌿 Doğal Ürün Marketi", icon: "fa-store" }
        ];
        return `
            <aside class="fixed left-0 top-0 h-full w-72 bg-[#0a2b4e] shadow-2xl border-r border-[#1e4a76] p-5 overflow-y-auto z-10">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3"><i class="fas fa-flask text-gold text-2xl"></i><h1 class="text-2xl font-bold text-white">Ar-Ge Platformu</h1></div>
                    <div class="admin-badge" onclick="openAdminPanel()"><i class="fas fa-shield-alt mr-1"></i>Yönetim</div>
                </div>
                <nav class="space-y-1">
                    ${menu.map(item => `<div onclick="currentPage='${item.id}'; render()" class="sidebar-link ${currentPage === item.id ? 'active-page' : 'text-gray-300'}"><i class="fas ${item.icon} w-5"></i><span class="text-white">${item.label}</span></div>`).join('')}
                </nav>
                <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-[#1e4a76]">
                    ${!currentUser ? `<button onclick="openLoginModal()" class="w-full btn-gold py-2 rounded-lg">Giriş Yap / Kayıt Ol</button>` : `<div class="text-center"><p class="text-gold font-bold">${currentUser.name}</p><p class="text-sm text-gray-300">${currentUser.role === 'admin' ? 'Yönetici' : 'Kullanıcı'}</p><button onclick="handleLogout()" class="mt-2 text-red-400 text-sm">Çıkış Yap</button></div>`}
                </div>
            </aside>
        `;
    }
    
    // ---------- ANA SAYFA (GENİŞLETİLMİŞ FORMÜLLER & YAPAY ZEKA) ----------
    function renderHomePage() {
        return `
            <div class="card p-6 mb-8">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-robot mr-2"></i>Yapay Zeka ile Formül Hazırlama</h2>
                <p class="text-gray-light mb-3">Yapay zeka (makine öğrenmesi ve optimizasyon algoritmaları) sayesinde bitkisel ekstraktların sinerjik etkileri analiz edilerek optimum formülasyonlar oluşturulur. AI, binlerce ham madde kombinasyonunu tarar, stabilite ve etkinlik tahmini yapar, üretim parametrelerini optimize eder.</p>
                <p class="text-gray-light"><span class="text-gold font-semibold">Örnek AI Kullanımı:</span> Doğal koruyucu sistemlerin tahmini (mikrobiyolojik modelleme), cilt tipine göre aktif bileşen önerileri (sinir ağları), en düşük maliyetli formül optimizasyonu (genetik algoritmalar).</p>
            </div>
            <div class="card p-6 mb-8">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-lightbulb mr-2"></i>1. Ürün Konseptleri (5 Gıda / 5 Kozmetik)</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="text-xl font-semibold text-gold mb-2">🍏 Fonksiyonel Gıdalar</h3>
                        <table class="w-full text-sm border-collapse">
                            <thead><tr class="border-b border-gold/50"><th class="text-left p-1 text-gold">Ürün</th><th class="text-left p-1 text-gold">Hedef Kullanıcı</th><th class="text-left p-1 text-gold">Aktif Bileşenler</th> </tr></thead>
                            <tbody class="text-gray-light">
                                <tr><td class="p-1">Probiyotik Fermente İçecek</td><td class="p-1">Bağırsak sağlığı</td><td class="p-1">Lactobacillus, İnülin</td></tr>
                                <tr><td class="p-1">Adaptojen Bitki Çayı</td><td class="p-1">Stres</td><td class="p-1">Ashwagandha, Melisa</td></tr>
                                <tr><td class="p-1">Kolajenli Vegan Bar</td><td class="p-1">Sporcular</td><td class="p-1">Bitkisel kolajen, C vitamini</td></tr>
                                <tr><td class="p-1">Omega-3 Kapsül (Alg bazlı)</td><td class="p-1">Veganlar</td><td class="p-1">Alg DHA/EPA</td></tr>
                                <tr><td class="p-1">Moringa Toz Karışımı</td><td class="p-1">Vitamin eksikliği</td><td class="p-1">Moringa, Spirulina</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold text-gold mb-2">💄 Doğal Kozmetikler</h3>
                        <table class="w-full text-sm border-collapse">
                            <thead><tr class="border-b border-gold/50"><th class="text-left p-1 text-gold">Ürün</th><th class="text-left p-1 text-gold">Hedef Kullanıcı</th><th class="text-left p-1 text-gold">Aktif Bileşenler</th> </tr></thead>
                            <tbody class="text-gray-light">
                                <tr><td class="p-1">Niasinamidli Tonik</td><td class="p-1">Akne eğilimli</td><td class="p-1">Niasinamid, Gül suyu</td></tr>
                                <tr><td class="p-1">Retinol Alternatif Serum</td><td class="p-1">Olgun cilt</td><td class="p-1">Bakuchiol, Hiyalüronik asit</td></tr>
                                <tr><td class="p-1">Shea Nemlendirici</td><td class="p-1">Kuru cilt</td><td class="p-1">Shea, Balmumu</td></tr>
                                <tr><td class="p-1">Kükürtsüz Şampuan Bar</td><td class="p-1">Saç dökülmesi</td><td class="p-1">Bıttım yağı, Isırgan</td></tr>
                                <tr><td class="p-1">Enzimatik Cilt Maskesi</td><td class="p-1">Leke problemi</td><td class="p-1">Papain, Kil</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="grid md:grid-cols-2 gap-8 mb-8">
                <div class="card p-6">
                    <h3 class="text-xl font-bold text-gold mb-3">🥤 Probiyotik Fermente İçecek (Gıda)</h3>
                    <table class="w-full text-sm"> <tr><td class="text-gold">Hammadde</td><td class="text-gold">%</td><td class="text-gold">Fonksiyon</td></tr>
                    <tr class="text-gray-light"><td>Peynir altı suyu</td><td>85%</td><td>Fermentasyon bazı</td></tr>
                    <tr class="text-gray-light"><td>İnülin</td><td>5%</td><td>Prebiyotik</td></tr>
                    <tr class="text-gray-light"><td>Lactobacillus plantarum</td><td>2%</td><td>Probiyotik</td></tr>
                    <tr class="text-gray-light"><td>Zencefil konsantresi</td><td>3%</td><td>Antioksidan</td></tr>
                    <tr class="text-gray-light"><td>Stevia</td><td>0.5%</td><td>Tatlılık</td></tr>
                    <tr class="text-gray-light"><td>Su</td><td>4.5%</td><td>Kıvam</td></tr>
                    </table>
                    <div class="bg-[#0f2c44] p-2 rounded mt-2 text-sm text-gray-light">Stabilite: 4°C 28 gün, pH 3.8-4.2</div>
                </div>
                <div class="card p-6">
                    <h3 class="text-xl font-bold text-gold mb-3">💧 Niasinamidli Tonik (Kozmetik)</h3>
                    <table class="w-full text-sm"> <tr><td class="text-gold">Hammadde</td><td class="text-gold">%</td><td class="text-gold">Fonksiyon</td></tr>
                    <tr class="text-gray-light"><td>Gül hidrosolü</td><td>70%</td><td>Sulu baz</td></tr>
                    <tr class="text-gray-light"><td>Niasinamid</td><td>5%</td><td>Gözenek sıkılaştırma</td></tr>
                    <tr class="text-gray-light"><td>Çay ağacı hidrolatı</td><td>10%</td><td>Antibakteriyel</td></tr>
                    <tr class="text-gray-light"><td>Propanediol</td><td>8%</td><td>Penetrasyon</td></tr>
                    <tr class="text-gray-light"><td>Pentilen glikol</td><td>3%</td><td>Nemlendirici</td></tr>
                    <tr class="text-gray-light"><td>Potasyum sorbat</td><td>0.5%</td><td>Koruyucu</td></tr>
                    </table>
                    <div class="bg-[#0f2c44] p-2 rounded mt-2 text-sm text-gray-light">Stabilite: 25°C/3 ay, pH 5.2-5.8</div>
                </div>
            </div>
            <div class="card p-6 mb-8">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-chart-line mr-2"></i>Maliyet & Satış Fiyatı Simülatörü</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div><label class="text-gold block mb-1">Ürün Tipi</label><select id="productType" class="input-dark"><option value="probiotic">Probiyotik İçecek (250 ml)</option><option value="tonic">Niasinamid Tonik (100 ml)</option></select></div>
                    <div><label class="text-gold block mb-1">Hammadde Maliyeti (₺/kg)</label><input type="number" id="rawCost" value="45" class="input-dark"></div>
                    <div><label class="text-gold block mb-1">Ambalaj Maliyeti (₺/adet)</label><input type="number" id="packCost" value="3.5" class="input-dark"></div>
                    <div><label class="text-gold block mb-1">İşçilik + Genel Gider (₺/adet)</label><input type="number" id="overheadCost" value="2.8" class="input-dark"></div>
                    <div><label class="text-gold block mb-1">Hedef Kar Marjı (%)</label><input type="number" id="profitMargin" value="45" class="input-dark"></div>
                    <div><button id="calcBtn" class="btn-gold py-2 rounded-lg w-full">Hesapla</button></div>
                </div>
                <div class="mt-6 p-4 bg-[#0f2c44] rounded-xl grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div><p class="text-gray-300 text-sm">Birim Hammadde</p><p id="unitRaw" class="text-xl font-bold text-gold">0 ₺</p></div>
                    <div><p class="text-gray-300 text-sm">Toplam Üretim Maliyeti</p><p id="totalCost" class="text-xl font-bold text-gold">0 ₺</p></div>
                    <div><p class="text-gray-300 text-sm">Önerilen Satış Fiyatı</p><p id="sellPrice" class="text-xl font-bold text-gold">0 ₺</p></div>
                    <div><p class="text-gray-300 text-sm">Birim Kar</p><p id="profit" class="text-xl font-bold text-green-400">0 ₺</p></div>
                </div>
            </div>
            <div class="card p-6 mb-8">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-industry mr-2"></i>Endüstriyel Üretim Hattı (GMP)</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div><h3 class="text-gold font-semibold">Probiyotik İçecek</h3><ul class="list-disc list-inside text-sm text-gray-light"> <li>Karıştırma tankı (316L)</li><li>Homojenizasyon</li><li>Pastörizasyon (72°C)</li><li>Fermantasyon tankı</li><li>Soğuk dolum</li></ul></div>
                    <div><h3 class="text-gold font-semibold">Niasinamid Tonik</h3><ul class="list-disc list-inside text-sm text-gray-light"> <li>Hidrosol üretimi</li><li>Karıştırma reaktörü</li><li>Derin filtrasyon</li><li>Steril dolum</li></ul></div>
                </div>
                <div class="mt-3 p-2 bg-[#0f2c44] rounded text-sm text-gray-light"><span class="text-gold">Yatırım:</span> ~1.5M ₺ (küçük ölçekli hat)</div>
            </div>
            <div class="card p-6 mb-8">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-clipboard-list mr-2"></i>Kalite & Regülasyon</h2>
                <table class="w-full text-sm"> <tr><th class="text-gold p-1">Parametre</th><th class="text-gold p-1">Probiyotik İçecek</th><th class="text-gold p-1">Niasinamid Tonik</th></tr>
                <tr class="text-gray-light"><td class="p-1">Mikrobiyolojik limit</td><td class="p-1">TPK < 10^3</td><td class="p-1">Küf/maya < 100</td></tr>
                <tr class="text-gray-light"><td class="p-1">Ağır metal</td><td class="p-1">Pb < 0.1 ppm</td><td class="p-1">Pb < 1 ppm</td></tr>
                <tr class="text-gray-light"><td class="p-1">Regülasyon</td><td class="p-1">Türk Gıda Kodeksi</td><td class="p-1">Kozmetik Yönetmeliği</td></tr>
                </table>
            </div>
            <div class="card p-6">
                <h2 class="text-2xl font-bold text-gold mb-4"><i class="fas fa-rocket mr-2"></i>Startup Kurulum Planı</h2>
                <div class="grid md:grid-cols-3 gap-4 text-sm">
                    <div class="bg-[#0f2c44] p-3 rounded"><p class="text-gold font-bold">Min. Yatırım</p><p class="text-gray-light">Makine: 1.5M ₺<br>AR-GE: 400k ₺<br>Toplam ~2.45M ₺</p></div>
                    <div class="bg-[#0f2c44] p-3 rounded"><p class="text-gold font-bold">Yıllık Maliyet (100k adet)</p><p class="text-gray-light">Hammadde: 1.2M ₺<br>Toplam: 2.33M ₺</p></div>
                    <div class="bg-[#0f2c44] p-3 rounded"><p class="text-gold font-bold">Kar Marjı</p><p class="text-gray-light">Ort. satış 90 ₺, gelir 9M ₺<br>Net kar marjı ~%53</p></div>
                </div>
            </div>
        `;
    }
    
    // ---------- DİĞER YENİ SAYFALAR ----------
    function renderCalculator() {
        return `
            <div class="card p-6">
                <h2 class="text-2xl font-bold text-gold mb-4">🧪 Sabun Hesaplayıcı (Ürün Hesaplama)</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gold font-semibold mb-1">Sabun Türü</label>
                        <select id="soapType" class="input-dark mb-4" onchange="updateSoapCalculator()">
                            <option value="solid">Katı Sabun (NaOH)</option>
                            <option value="liquid">Sıvı Sabun (KOH)</option>
                        </select>
                        <label class="block text-gold font-semibold mb-1">Toplam Yağ Ağırlığı (gram)</label>
                        <input type="number" id="oilAmount" value="1000" class="input-dark mb-4" oninput="updateSoapCalculator()">
                        <label class="block text-gold font-semibold mb-1">Su Yüzdesi (%)</label>
                        <input type="number" id="waterPercent" value="30" class="input-dark mb-4" oninput="updateSoapCalculator()">
                        <label class="block text-gold font-semibold mb-1">Süper Yağlama (%)</label>
                        <input type="number" id="superfat" value="5" class="input-dark mb-4" oninput="updateSoapCalculator()">
                    </div>
                    <div class="bg-[#0f2c44] p-4 rounded-xl">
                        <h3 class="text-gold font-bold mb-3">Hesaplanan Değerler</h3>
                        <p class="text-gray-light">Kostik (NaOH/KOH) : <span id="lyeAmount" class="text-gold font-bold">0</span> gr</p>
                        <p class="text-gray-light">Su Miktarı : <span id="waterAmountResult" class="text-gold font-bold">0</span> gr</p>
                        <p class="text-gray-light">Toplam Ağırlık : <span id="totalWeight" class="text-gold font-bold">0</span> gr</p>
                        <button class="mt-4 btn-gold w-full py-2 rounded-lg" onclick="whatsappLink('Sabun hesaplama sonucu: Kostik: '+document.getElementById('lyeAmount').innerText+' gr, Su: '+document.getElementById('waterAmountResult').innerText+' gr')">Sonucu WhatsApp ile Paylaş</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderPackages() {
        return `
            <div class="card p-6">
                <h2 class="text-2xl font-bold text-gold mb-4">📦 Özel Ürün Paketleri</h2>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${packages.map(p => `
                        <div class="bg-[#0f2c44] rounded-xl p-6 text-center ${p.popular ? 'border-2 border-gold' : ''}">
                            ${p.popular ? '<span class="bg-gold text-[#0a2b4e] text-xs font-bold px-3 py-1 rounded-full">Popüler</span>' : ''}
                            <i class="fas ${p.icon} text-gold text-4xl my-3"></i>
                            <h3 class="text-xl font-bold text-white">${p.name}</h3>
                            <p class="text-2xl font-bold text-gold my-2">${formatMoney(p.price)}</p>
                            <ul class="text-sm text-gray-300 text-left mt-4 space-y-2">
                                ${p.features.map(f => `<li><i class="fas fa-check text-gold mr-2"></i>${f}</li>`).join('')}
                            </ul>
                            <button onclick="whatsappLink('${p.whatsapp}')" class="mt-6 w-full btn-gold py-2 rounded-lg font-semibold">WhatsApp ile Satın Al</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }
    
    function renderMarket() {
        return `
            <div class="card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gold">🌿 Doğal Ürün Marketi</h2>
                    ${isAdmin ? '<span class="text-xs text-gold">Yönetici Modu Aktif</span>' : ''}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${products.map(p => `
                        <div class="bg-[#0f2c44] rounded-xl p-4 text-center">
                            <div class="text-5xl mb-3">${p.image}</div>
                            <h3 class="text-lg font-bold text-white">${p.name}</h3>
                            <p class="text-gold text-sm">${p.type}</p>
                            <p class="text-2xl font-bold text-gold my-2">${formatMoney(p.price)}</p>
                            <button onclick="whatsappLink('${p.name} ürününü satın almak istiyorum.')" class="mt-2 w-full btn-gold py-2 rounded-lg"><i class="fab fa-whatsapp mr-1"></i>WhatsApp ile Sipariş Ver</button>
                            ${isAdmin ? `<button onclick="deleteProduct(${p.id})" class="mt-2 text-red-400 text-sm w-full">Ürünü Sil</button>` : ''}
                        </div>
                    `).join('')}
                </div>
                ${isAdmin ? `<button onclick="renderAdminModal()" class="mt-6 w-full btn-gold py-2 rounded-lg">+ Yeni Ürün Ekle</button>` : ''}
            </div>
        `;
    }
    
    // ---------- FOOTER ----------
    function renderFooter() {
        return `
            <footer class="mt-12 pt-6 border-t border-gold/30 text-center text-gray-400 text-sm">
                <div class="flex flex-wrap justify-center gap-6 mb-2">
                    <span><i class="fas fa-user-circle text-gold mr-1"></i> Ar-Ge Direktörü: Orhan BOYRAZ</span>
                    <span><i class="fab fa-whatsapp text-gold mr-1"></i> 0540 966 6602</span>
                    <span><i class="fas fa-envelope text-gold mr-1"></i> orhanboyraz0216@gmail.com</span>
                    <span><i class="fas fa-map-marker-alt text-gold mr-1"></i> Agora Çarşısı No: Z/31 Nilüfer/BURSA</span>
                    <span><i class="fas fa-globe text-gold mr-1"></i> <a href="https://anadolunetwork.tr/" target="_blank" class="hover:underline">anadolunetwork.tr</a></span>
                </div>
                <p>© 2025 Ar-Ge Üretim Platformu – GMP, ISO 22716, FDA Uyumlu | Tüm formüller tescillidir.</p>
            </footer>
        `;
    }
    
    // ---------- RENDER ----------
    function render() {
        let content = "";
        if (currentPage === "home") content = renderHomePage();
        else if (currentPage === "calculator") content = renderCalculator();
        else if (currentPage === "packages") content = renderPackages();
        else if (currentPage === "market") content = renderMarket();
        else content = renderHomePage();
        
        const html = `<div class="flex min-h-screen">${renderSidebar()}<main class="flex-1 ml-72 p-6"><div class="max-w-7xl mx-auto">${content}${renderFooter()}</div></main></div>`;
        document.getElementById("app").innerHTML = html;
        
        const calcBtn = document.getElementById("calcBtn");
        if (calcBtn) {
            calcBtn.onclick = () => {
                let prodType = document.getElementById("productType").value;
                let rawCost = parseFloat(document.getElementById("rawCost").value) || 0;
                let packCost = parseFloat(document.getElementById("packCost").value) || 0;
                let overhead = parseFloat(document.getElementById("overheadCost").value) || 0;
                let margin = parseFloat(document.getElementById("profitMargin").value) || 0;
                let unitRaw = prodType === "probiotic" ? rawCost * 0.250 : rawCost * 0.100;
                let totalCost = unitRaw + packCost + overhead;
                let sellPrice = totalCost * (1 + margin/100);
                let profit = sellPrice - totalCost;
                document.getElementById("unitRaw").innerText = unitRaw.toFixed(2) + " ₺";
                document.getElementById("totalCost").innerText = totalCost.toFixed(2) + " ₺";
                document.getElementById("sellPrice").innerText = sellPrice.toFixed(2) + " ₺";
                document.getElementById("profit").innerText = profit.toFixed(2) + " ₺";
            };
            calcBtn.click();
        }
        if (currentPage === "calculator") updateSoapCalculator();
    }
    
    render();
    window.whatsappLink = whatsappLink;
    window.openLoginModal = openLoginModal;
    window.openAdminPanel = openAdminPanel;
    window.deleteProduct = deleteProduct;
    window.updateSoapCalculator = updateSoapCalculator;
    window.renderAdminModal = renderAdminModal;
</script>
</body>
</html>
